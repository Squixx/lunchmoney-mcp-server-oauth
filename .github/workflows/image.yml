name: Build & publish image

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am — picks up Alpine + distroless security patches
  workflow_dispatch:

# Least-privilege default for every job; only the build job gets
# packages:write (and fork-PR runs get a read-only token regardless).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0  # full history so the version-bump guard can diff against base
          persist-credentials: false  # no job needs an authenticated git remote afterwards

      - name: Require version bump for image-affecting changes
        # Every change that alters what ships in the image must come with a
        # package.json version bump, so a new image tag is published and
        # downstream Renovate pins pick it up. Renovate PRs satisfy this
        # automatically via bumpVersion (see renovate.json); this guard
        # catches human PRs. Dockerfile-only changes (base image digests)
        # are exempt — the weekly rebuild refreshes bases under the same
        # version tag.
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")
          echo "changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(server\.mjs|oauth\.mjs|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)$'; then
            version=$(node -p "require('./package.json').version")
            if git ls-remote --exit-code --tags origin "v$version" >/dev/null 2>&1; then
              echo "::error::image-affecting files changed but version $version is already released — bump the version in package.json"
              exit 1
            fi
          fi

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24.18.0'

      - name: Enable Corepack
        env:
          COREPACK_ENABLE_STRICT: '1'
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          corepack install

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile --prod

      - name: Syntax check
        run: |
          node --check server.mjs
          node --check oauth.mjs
          node --check sanitize.mjs

      - name: Null-sanitizer unit tests
        # Verifies schema-forbidden nulls are pruned while schema-permitted
        # nulls (write-tool clear fields) are preserved.
        run: node sanitize.test.mjs

      - name: OAuth + MCP smoke test
        # Boots the real server with dummy credentials and exercises the
        # full OAuth 2.1 flow (discovery → DCR → consent → PKCE token
        # exchange) plus an authenticated MCP initialize + tools/list.
        # No outbound calls — the Lunch Money API is only hit by tool
        # invocations, which the test doesn't perform.
        run: node smoke-test.mjs

      - name: Audit (moderate+)
        run: pnpm audit --prod --audit-level=moderate

  build:
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Read version from package.json
        id: meta
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          upstream=$(node -p "require('./package.json').dependencies['@akutishevsky/lunchmoney-mcp']")
          # These values come from the PR head on pull_request runs and feed
          # step outputs / image tags — reject anything that isn't a plain
          # semver-ish token so multiline or shell-meta content can't ride along.
          # Patterns live in variables: bash tokenizes unquoted < > inside
          # [[ ]] as operators before the =~ pattern is parsed.
          version_re='^[0-9A-Za-z.+-]+$'
          upstream_re='^[0-9A-Za-z.^~<>=* +-]+$'
          if ! [[ "$version" =~ $version_re ]]; then
            echo "::error::package.json version '$version' is not a valid version token"
            exit 1
          fi
          if ! [[ "$upstream" =~ $upstream_re ]]; then
            echo "::error::upstream dependency range '$upstream' contains unexpected characters"
            exit 1
          fi
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "upstream=$upstream" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # On PRs we only verify the image builds. Login + push are skipped so
      # nothing ever lands in ghcr from an unmerged change.
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: img
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ steps.meta.outputs.owner }}/lunchmoney-mcp
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            app.lunchmoney-mcp.upstream-version=${{ steps.meta.outputs.upstream }}

      - name: Build (and push on non-PR)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.tags }}
          labels: ${{ steps.img.outputs.labels }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tag + GitHub Release per version, created right after the image for that
  # version is first published. Idempotent: re-runs (including the weekly
  # scheduled rebuild, which is excluded anyway) skip if the tag exists.
  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false  # gh uses GH_TOKEN, not the git credential

      - name: Create release if version is new
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          upstream=$(node -p "require('./package.json').dependencies['@akutishevsky/lunchmoney-mcp']")
          owner=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          if gh release view "v$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release v$version already exists — nothing to do"
            exit 0
          fi
          # Publish the manifest-list digest alongside the tag so consumers
          # can pin the immutable image, and attach it as a checksums asset.
          image="ghcr.io/$owner/lunchmoney-mcp"
          printf '%s  %s:%s\n' "$IMAGE_DIGEST" "$image" "$version" > checksums.txt
          gh release create "v$version" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$version" \
            --generate-notes \
            --notes "$(printf 'Image: `%s:%s` · upstream `@akutishevsky/lunchmoney-mcp` %s\n\nPinned (immutable): `%s@%s`' "$image" "$version" "$upstream" "$image" "$IMAGE_DIGEST")" \
            checksums.txt

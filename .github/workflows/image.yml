name: Build & publish image

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am — picks up Alpine + distroless security patches
  workflow_dispatch:

# Least-privilege default for every job; only the build job gets
# packages:write (and fork-PR runs get a read-only token regardless).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.23.1'

      - name: Enable Corepack
        env:
          COREPACK_ENABLE_STRICT: '1'
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          corepack install

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile --prod

      - name: Syntax check
        run: |
          node --check server.mjs
          node --check oauth.mjs

      - name: OAuth + MCP smoke test
        # Boots the real server with dummy credentials and exercises the
        # full OAuth 2.1 flow (discovery → DCR → consent → PKCE token
        # exchange) plus an authenticated MCP initialize + tools/list.
        # No outbound calls — the Lunch Money API is only hit by tool
        # invocations, which the test doesn't perform.
        run: node smoke-test.mjs

      - name: Audit (moderate+)
        run: pnpm audit --prod --audit-level=moderate

  build:
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read version from package.json
        id: meta
        run: |
          version=$(node -p "require('./package.json').version")
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      # On PRs we only verify the image builds. Login + push are skipped so
      # nothing ever lands in ghcr from an unmerged change.
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: img
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.meta.outputs.owner }}/lunchmoney-mcp
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.tags }}
          labels: ${{ steps.img.outputs.labels }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

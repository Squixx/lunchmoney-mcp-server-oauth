# pnpm config — pnpm 11 prefers `pnpm-workspace.yaml` over `.npmrc` for
# pnpm-specific options. Read by every pnpm invocation in this directory
# so a fresh checkout enforces the same install posture in dev, CI, and
# the Docker build stage.

# Refuse to install a package version published less than 24h ago.
# Catches typosquats and immediately-yanked malicious releases before
# they can make it into the lockfile or a build.
minimumReleaseAge: 1440

# Refuse to run `pnpm <script>` if installed modules don't match the
# lockfile.
verifyDepsBeforeRun: error

# No surprises in peer dependency resolution.
strictPeerDependencies: true
autoInstallPeers: false
dedupePeerDependents: true

# Match this project's `engines` field; refuse to install on the wrong
# Node.
engineStrict: true

# Flat node_modules layout so the runtime image can be a single
# distroless copy with no symlink store to chase.
nodeLinker: hoisted

# Do not execute install / postinstall scripts from any dependency.
# The lunchmoney-mcp server is pure JS; nothing here needs to compile
# or run arbitrary code at install time.
ignoreScripts: true

# Force patched versions of transitively-pulled dependencies that carry
# published advisories. These are dragged in via @modelcontextprotocol/sdk
# (and @akutishevsky/lunchmoney-mcp) and cannot be bumped from our direct
# deps, so pin them here until upstream ships the fixes.
overrides:
  # GHSA-v2hh-gcrm-f6hx / GHSA-4c8g-83qw-93j6 — host confusion via literal
  # backslash authority delimiter and failed IDN canonicalization.
  # Pulled in through ajv / ajv-formats. Patched in 3.1.4; kept on the
  # 3.x line ajv expects to avoid a cross-major bump of a validator dep.
  fast-uri: '>=3.1.4 <4'
  # GHSA-frvp-7c67-39w9 — path traversal in serve-static on Windows via
  # encoded backslash (%5C). Pulled in through the SDK. Patched in 2.0.5.
  '@hono/node-server': '>=2.0.5'
